<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToxikWick Journal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0e17; }
        .gold-text { color: #fbbf24; }
        .gold-border { border-color: #fbbf24; }
        .gold-bg { background-color: #fbbf24; }
        input, select { background-color: #111827; border: 1px solid #374151; color: white; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [view, setView] = useState('log'); // 'log', 'add', or 'stats'

            return (
                <div class="min-h-screen text-gray-300 p-4 max-w-lg mx-auto">
                    {/* Header Section */}
                    <div class="mb-6">
                        <p class="text-[10px] gold-text tracking-widest mb-1">X A U U S D</p>
                        <div class="flex justify-between items-center">
                            <h1 class="text-xl font-bold text-white tracking-tighter">TRADE JOURNAL</h1>
                            <div class="flex gap-2">
                                <button onClick={() => setView('log')} class={`px-3 py-1 text-[10px] border ${view === 'log' ? 'gold-bg text-black' : 'border-yellow-600 gold-text'}`}>LOG</button>
                                <button onClick={() => setView('add')} class={`px-3 py-1 text-[10px] border ${view === 'add' ? 'gold-bg text-black' : 'border-yellow-600 gold-text'}`}>+ ADD</button>
                                <button onClick={() => setView('stats')} class={`px-3 py-1 text-[10px] border ${view === 'stats' ? 'gold-bg text-black' : 'border-yellow-600 gold-text'}`}>STATS</button>
                            </div>
                        </div>
                        <div class="h-[1px] gold-bg mt-4 w-full opacity-50"></div>
                    </div>

                    {/* View: Trade Log */}
                    {view === 'log' && (
                        <div>
                            <div class="flex justify-between items-center mb-10">
                                <h2 class="text-[10px] gold-text tracking-widest uppercase">Trade Log</h2>
                                <p class="text-[10px] text-gray-500">0 TRADES</p>
                            </div>
                            <div class="flex flex-col items-center justify-center mt-20 opacity-40">
                                <div class="text-4xl mb-4">📈</div>
                                <p class="text-xs tracking-widest">NO TRADES LOGGED YET</p>
                                <p class="text-[10px] mt-2">Press + ADD to log your first trade</p>
                            </div>
                        </div>
                    )}

                    {/* View: Add Trade Form */}
                    {view === 'add' && (
                        <div class="space-y-4">
                            <h2 class="text-[10px] gold-text tracking-widest uppercase mb-4">Log New Trade</h2>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="flex flex-col">
                                    <label class="text-[10px] mb-1">DATE</label>
                                    <input type="date" defaultValue="2026-04-16" />
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] mb-1">SESSION</label>
                                    <div class="flex gap-1">
                                        <button class="flex-1 gold-bg text-black text-[10px] py-2 font-bold">NY</button>
                                        <button class="flex-1 border border-yellow-600 gold-text text-[10px] py-2">Asia</button>
                                    </div>
                                </div>
                            </div>

                            <div class="flex flex-col">
                                <label class="text-[10px] mb-1">DIRECTION</label>
                                <div class="flex gap-2">
                                    <button class="flex-1 bg-green-500 text-black font-bold py-4">BUY</button>
                                    <button class="flex-1 border border-red-500 text-red-500 py-4">SELL</button>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div class="flex flex-col"><label class="text-[10px]">ENTRY PRICE</label><input type="text" placeholder="0.000" /></div>
                                <div class="flex flex-col"><label class="text-[10px]">STOP LOSS</label><input type="text" placeholder="0.000" /></div>
                            </div>

                            <div class="flex flex-col">
                                <label class="text-[10px] mb-1">OUTCOME</label>
                                <div class="space-y-2">
                                    <button class="w-full bg-green-500 text-black py-2 font-bold text-[10px]">WIN</button>
                                    <button class="w-full border border-red-500 text-red-500 py-2 text-[10px]">LOSS</button>
                                    <button class="w-full border border-yellow-600 gold-text py-2 text-[10px]">BREAKEVEN</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* View: Stats */}
                    {view === 'stats' && (
                        <div class="text-center">
                            <h2 class="text-[10px] gold-text tracking-widest uppercase mb-6">Performance Overview</h2>
                            <div class="relative w-40 h-40 mx-auto mb-8 border-4 border-red-500 rounded-full flex flex-col items-center justify-center">
                                <p class="text-3xl font-bold text-white">0%</p>
                                <p class="text-[8px] text-gray-500">WIN RATE</p>
                                <p class="text-[8px] text-gray-500">TARGET: 70%</p>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="bg-gray-900 p-4 rounded border border-gray-800"><p class="text-[8px] mb-1">TOTAL TRADES</p><p class="text-xl">0</p></div>
                                <div class="bg-gray-900 p-4 rounded border border-gray-800"><p class="text-[8px] mb-1 text-green-500">TOTAL P&L</p><p class="text-xl text-green-500">$0.00</p></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
