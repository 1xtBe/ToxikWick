<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOXIKWICK | XAUUSD</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0a0e17; --card: #111722; --green: #00ff87; --red: #ff4757; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); padding-bottom: 15px; margin-bottom: 20px; }
        .tab-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 6px 12px; font-size: 11px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--gold); color: #000; }
        input, select { background: #111722; border: 1px solid #1e2a3a; color: #fff; padding: 12px; width: 100%; box-sizing: border-box; margin-bottom: 12px; border-radius: 4px; }
        .btn-main { background: var(--gold); color: #000; border: none; font-weight: bold; padding: 16px; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 10px; border-radius: 4px; }
        .win-circle { width: 150px; height: 150px; border: 4px solid var(--red); border-radius: 50%; margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-card { background: var(--card); border: 1px solid #1e2a3a; padding: 15px; border-radius: 4px; }
        .confluence-item { background: #111722; border: 1px solid #1e2a3a; padding: 12px; margin-bottom: 8px; font-size: 13px; color: #888; border-radius: 4px; cursor: pointer; }
        .confluence-item.active { border-color: var(--green); color: var(--green); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // PASTE YOUR ACTUAL KEYS HERE
        const SUPABASE_URL = 'https://pewkiwknniphfwhnoxsv.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_l4PTYKlCiPoVGkQZj0loWQ_JMHGkGd3';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [view, setView] = useState("add");
            const [trades, setTrades] = useState([]);
            const [form, setForm] = useState({
                entry: "", sl: "", pnl: "", outcome: "WIN", confluences: []
            });

            const confluenceList = ["Liquidity Zone", "RN Confluence", "Rejection Candle", "H1 Bias Aligned", "No News Event"];

            useEffect(() => { fetchTrades(); }, []);
            
            async function fetchTrades() {
                try {
                    const { data, error } = await supabaseClient.from('trades').select('*').order('created_at', { ascending: false });
                    if (data) setTrades(data);
                } catch (e) { console.error(e); }
            }

            const toggleConfluence = (item) => {
                const updated = form.confluences.includes(item) 
                    ? form.confluences.filter(i => i !== item) 
                    : [...form.confluences, item];
                setForm({...form, confluences: updated});
            };

            async function handleSave() {
                const { error } = await supabaseClient.from('trades').insert([{ ...form, pair: 'XAUUSD' }]);
                if (!error) { fetchTrades(); setView("stats"); } else { alert("Check Supabase Keys!"); }
            }

            const stats = {
                wr: trades.length ? Math.round((trades.filter(t=>t.outcome==="WIN").length/trades.length)*100) : 0,
                total: trades.length,
                pnl: trades.reduce((s, t) => s + (parseFloat(t.pnl) || 0), 0).toFixed(2)
            };

            return (
                <div className="container">
                    <header>
                        <div>
                            <div style={{color: 'var(--gold)', fontSize: '10px'}}>XAUUSD</div>
                            <div style={{fontSize: '22px', fontWeight: 'bold'}}>TOXIKWICK</div>
                        </div>
                        <div style={{display: 'flex', gap: '5px'}}>
                            <button className={`tab-btn ${view==='add'?'active':''}`} onClick={()=>setView('add')}>+ ADD</button>
                            <button className={`tab-btn ${view==='stats'?'active':''}`} onClick={()=>setView('stats')}>STATS</button>
                        </div>
                    </header>

                    {view === "add" ? (
                        <div>
                            <div style={{color: 'var(--gold)', fontSize: '12px', marginBottom: '15px'}}>NEW TRADE ENTRY</div>
                            <input type="number" placeholder="ENTRY" value={form.entry} onChange={e=>setForm({...form, entry: e.target.value})} />
                            <input type="number" placeholder="SL" value={form.sl} onChange={e=>setForm({...form, sl: e.target.value})} />
                            <input type="number" placeholder="PNL (USD)" value={form.pnl} onChange={e=>setForm({...form, pnl: e.target.value})} />
                            
                            <div style={{fontSize: '11px', color: '#555', margin: '10px 0'}}>CONFLUENCES</div>
                            {confluenceList.map(item => (
                                <div key={item} onClick={()=>toggleConfluence(item)} className={`confluence-item ${form.confluences.includes(item)?'active':''}`}>
                                    {form.confluences.includes(item) ? '✓ ' : '○ '} {item}
                                </div>
                            ))}
                            <button className="btn-main" onClick={handleSave}>CONFIRM LOG</button>
                        </div>
                    ) : (
                        <div style={{textAlign: 'center'}}>
                            <div className="win-circle">
                                <div style={{fontSize: '40px', fontWeight: 'bold'}}>{stats.wr}%</div>
                                <div style={{fontSize: '10px', color: '#888'}}>TOTAL WIN RATE</div>
                            </div>
                            <div className="grid">
                                <div className="stat-card">
                                    <div style={{fontSize: '20px'}}>{stats.total}</div>
                                    <div style={{fontSize: '10px', color: '#888'}}>TRADES</div>
                                </div>
                                <div className="stat-card">
                                    <div style={{fontSize: '20px', color: 'var(--green)'}}>${stats.pnl}</div>
                                    <div style={{fontSize: '10px', color: '#888'}}>TOTAL P&L</div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
