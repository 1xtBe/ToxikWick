<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToxikWick Journal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0e17; color: #d1d5db; font-family: sans-serif; }
        .gold-text { color: #fbbf24; }
        .gold-bg { background-color: #fbbf24; }
        input, select { background-color: #111827; border: 1px solid #374151; color: white; padding: 12px; border-radius: 4px; width: 100%; font-size: 14px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- PASTE YOUR DETAILS HERE ---
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        // -------------------------------

        function App() {
            const [client, setClient] = useState(null);
            const [view, setView] = useState('log');
            const [trades, setTrades] = useState([]);
            const [loading, setLoading] = useState(false);

            // Form States
            const [entry, setEntry] = useState('');
            const [sl, setSl] = useState('');
            const [tp, setTp] = useState('');
            const [outcome, setOutcome] = useState('WIN');
            const [session, setSession] = useState('NY');

            useEffect(() => {
                try {
                    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    setClient(sb);
                } catch (e) { console.error(e); }
            }, []);

            useEffect(() => {
                if (client) fetchTrades();
            }, [client]);

            async function fetchTrades() {
                const { data } = await client.from('trades').select('*').order('created_at', { ascending: false });
                if (data) setTrades(data);
            }

            async function saveTrade() {
                if(!entry || !sl) return alert("Fill Entry and SL");
                setLoading(true);
                const { error } = await client.from('trades').insert([{
                    entry_price: parseFloat(entry),
                    stop_loss: parseFloat(sl),
                    tp_level: parseFloat(tp) || 0,
                    outcome: outcome,
                    session: session,
                    pair: 'XAUUSD'
                }]);
                if (!error) {
                    setEntry(''); setSl(''); setTp('');
                    await fetchTrades();
                    setView('log');
                } else { alert(error.message); }
                setLoading(false);
            }

            if (!SUPABASE_URL.startsWith('http')) {
                return <div className="p-10 text-center text-red-500 font-bold">Error: Paste your Supabase URL in the code!</div>;
            }

            return (
                <div className="max-w-md mx-auto p-4 min-h-screen">
                    <header className="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
                        <div>
                            <p className="text-[10px] gold-text tracking-[0.2em]">XAUUSD</p>
                            <h1 className="font-bold text-xl text-white tracking-tighter">TOXIKWICK</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setView('log')} className={`text-[10px] px-3 py-1 border ${view === 'log' ? 'gold-bg text-black font-bold' : 'border-yellow-600 gold-text'}`}>LOG</button>
                            <button onClick={() => setView('add')} className={`text-[10px] px-3 py-1 border ${view === 'add' ? 'gold-bg text-black font-bold' : 'border-yellow-600 gold-text'}`}>+ ADD</button>
                        </div>
                    </header>

                    {view === 'log' ? (
                        <div className="space-y-3">
                            {trades.length === 0 ? (
                                <div className="text-center opacity-30 mt-20 uppercase text-[10px] tracking-widest">No trades found</div>
                            ) : (
                                trades.map(t => (
                                    <div key={t.id} className="bg-gray-900 p-4 border-l-2 border-yellow-500 flex justify-between items-center">
                                        <div>
                                            <p className="text-[10px] gold-text">{t.session} SESSION</p>
                                            <p className="text-sm font-bold">Entry: {t.entry_price}</p>
                                        </div>
                                        <span className={`text-[10px] font-bold px-2 py-1 rounded ${t.outcome === 'WIN' ? 'bg-green-900 text-green-400' : t.outcome === 'LOSS' ? 'bg-red-900 text-red-400' : 'bg-gray-800 text-yellow-500'}`}>
                                            {t.outcome}
                                        </span>
                                    </div>
                                ))
                            )}
                        </div>
                    ) : (
                        <div className="space-y-5">
                            <div>
                                <label className="text-[10px] gold-text block mb-1">SESSION</label>
                                <div className="flex gap-2">
                                    {['NY', 'Asia', 'London'].map(s => (
                                        <button key={s} onClick={() => setSession(s)} className={`flex-1 py-2 text-[10px] border ${session === s ? 'gold-bg text-black font-bold' : 'border-gray-700'}`}>{s}</button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] gold-text block mb-1">ENTRY PRICE</label>
                                <input type="number" step="0.001" value={entry} onChange={e => setEntry(e.target.value)} placeholder="0.000" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[10px] gold-text block mb-1">STOP LOSS</label><input type="number" step="0.001" value={sl} onChange={e => setSl(e.target.value)} /></div>
                                <div><label className="text-[10px] gold-text block mb-1">TAKE PROFIT</label><input type="number" step="0.001" value={tp} onChange={e => setTp(e.target.value)} /></div>
                            </div>
                            <div>
                                <label className="text-[10px] gold-text block mb-1">OUTCOME</label>
                                <select value={outcome} onChange={e => setOutcome(e.target.value)}>
                                    <option value="WIN">WIN</option>
                                    <option value="LOSS">LOSS</option>
                                    <option value="BE">BREAKEVEN</option>
                                </select>
                            </div>
                            <button onClick={saveTrade} disabled={loading} className="w-full gold-bg text-black font-bold py-4 rounded uppercase tracking-[0.2em]">
                                {loading ? 'Logging...' : 'Secure Trade Log'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
