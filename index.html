<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToxikWick Journal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            return (
                <div class="min-h-screen p-5">
                    <header class="border-b border-gray-800 pb-5 flex justify-between items-center">
                        <h1 class="text-yellow-500 text-2xl font-bold">TOXIKWICK JOURNAL</h1>
                    </header>
                    <main class="mt-10 text-center">
                        <p class="mb-5 text-gray-400">Your trading journal is live and ready.</p>
                        <button class="bg-yellow-500 text-black px-6 py-2 rounded font-bold hover:bg-yellow-400">
                            Log New Trade
                        </button>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
