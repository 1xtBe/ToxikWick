<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToxikWick Journal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- PASTE YOUR DETAILS HERE ---
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        // -------------------------------

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const SESSIONS = ["NY", "Asia"];
        const DIRECTIONS = ["BUY", "SELL"];
        const OUTCOMES = ["WIN", "LOSS", "BREAKEVEN"];
        const CONFLUENCES = ["Liquidity Zone", "RN Confluence", "Rejection Candle", "H1 Bias Aligned", "No News Event"];

        const initialForm = {
            date: new Date().toISOString().split("T")[0],
            session: "NY",
            direction: "BUY",
            entry: "",
            sl: "",
            tp1: "",
            tp2: "",
            outcome: "WIN",
            pnl: "",
            confluences: [],
            notes: "",
            mistake: "",
        };

        function App() {
            const [trades, setTrades] = useState([]);
            const [form, setForm] = useState(initialForm);
            const [view, setView] = useState("journal");
            const [loading, setLoading] = useState(true);
            const [saved, setSaved] = useState(false);

            useEffect(() => { fetchTrades(); }, []);

            async function fetchTrades() {
                setLoading(true);
                const { data, error } = await supabaseClient.from('trades').select('*').order('created_at', { ascending: false });
                if (data) setTrades(data);
                setLoading(false);
            }

            async function handleSubmit() {
                if (!form.entry || !form.sl || !form.pnl) return alert("Fill Entry, SL, and PnL");
                setSaved(true);
                
                const { error } = await supabaseClient.from('trades').insert([{
                    ...form,
                    entry: parseFloat(form.entry),
                    sl: parseFloat(form.sl),
                    pnl: parseFloat(form.pnl),
                    pair: 'XAUUSD'
                }]);

                if (!error) {
                    setForm(initialForm);
                    await fetchTrades();
                    setView("journal");
                } else {
                    alert("Error: " + error.message);
                }
                setSaved(false);
            }

            const toggleConfluence = (c) => {
                setForm(f => ({
                    ...f,
                    confluences: f.confluences.includes(c) 
                        ? f.confluences.filter(x => x !== c) 
                        : [...f.confluences, c]
                }));
            };

            // Stats Logic
            const stats = {
                total: trades.length,
                wins: trades.filter(t => t.outcome === "WIN").length,
                winRate: trades.length ? Math.round((trades.filter(t => t.outcome === "WIN").length / trades.length) * 100) : 0,
                totalPnl: trades.reduce((sum, t) => sum + (parseFloat(t.pnl) || 0), 0).toFixed(2)
            };

            return (
                <div style={{ minHeight: "100vh", background: "#0a0a0f", fontFamily: "monospace", color: "#e0e0e0" }}>
                    {/* Header */}
                    <div style={{ borderBottom: "1px solid #ffd700", padding: "15px", display: "flex", justifyContent: "space-between", background: "#0d1117" }}>
                        <div>
                            <div style={{ color: "#ffd700", fontSize: "10px", letterSpacing: "2px" }}>XAUUSD</div>
                            <div style={{ fontWeight: "bold" }}>TOXIKWICK</div>
                        </div>
                        <div style={{ display: "flex", gap: "5px" }}>
                            <button onClick={() => setView('journal')} style={{ border: "1px solid #ffd700", padding: "5px 10px", fontSize: "10px", color: view==='journal'?'#000':'#ffd700', background: view==='journal'?'#ffd700':'transparent' }}>LOG</button>
                            <button onClick={() => setView('add')} style={{ border: "1px solid #ffd700", padding: "5px 10px", fontSize: "10px", color: view==='add'?'#000':'#ffd700', background: view==='add'?'#ffd700':'transparent' }}>+ ADD</button>
                            <button onClick={() => setView('stats')} style={{ border: "1px solid #ffd700", padding: "5px 10px", fontSize: "10px", color: view==='stats'?'#000':'#ffd700', background: view==='stats'?'#ffd700':'transparent' }}>STATS</button>
                        </div>
                    </div>

                    <div style={{ padding: "20px", maxWidth: "500px", margin: "0 auto" }}>
                        {view === "add" && (
                            <div style={{ display: "flex", flexDirection: "column", gap: "15px" }}>
                                <div style={{ fontSize: "10px", color: "#ffd700" }}>NEW TRADE ENTRY</div>
                                <input type="number" placeholder="ENTRY" value={form.entry} onChange={e => setForm({...form, entry: e.target.value})} style={{ background: "#161b22", border: "1px solid #30363d", padding: "10px", color: "white" }}/>
                                <input type="number" placeholder="SL" value={form.sl} onChange={e => setForm({...form, sl: e.target.value})} style={{ background: "#161b22", border: "1px solid #30363d", padding: "10px", color: "white" }}/>
                                <input type="number" placeholder="PNL (USD)" value={form.pnl} onChange={e => setForm({...form, pnl: e.target.value})} style={{ background: "#161b22", border: "1px solid #30363d", padding: "10px", color: "#00ff87" }}/>
                                
                                <div style={{ fontSize: "10px", color: "#888" }}>CONFLUENCES</div>
                                {CONFLUENCES.map(c => (
                                    <button key={c} onClick={() => toggleConfluence(c)} style={{ textAlign: "left", fontSize: "10px", padding: "8px", border: "1px solid #30363d", background: form.confluences.includes(c) ? "#1a2a1a" : "transparent", color: form.confluences.includes(c) ? "#00ff87" : "#888" }}>
                                        {form.confluences.includes(c) ? "✓ " : "○ "}{c}
                                    </button>
                                ))}

                                <button onClick={handleSubmit} style={{ background: "#ffd700", color: "#000", padding: "15px", fontWeight: "bold", marginTop: "10px" }}>
                                    {saved ? "SAVING..." : "CONFIRM LOG"}
                                </button>
                            </div>
                        )}

                        {view === "journal" && (
                            <div>
                                {trades.map(t => (
                                    <div key={t.id} style={{ background: "#0d1117", padding: "15px", marginBottom: "10px", borderLeft: `4px solid ${t.outcome === 'WIN' ? '#00ff87' : '#ff4757'}` }}>
                                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                                            <span style={{ fontSize: "12px", fontWeight: "bold" }}>{t.direction} XAUUSD</span>
                                            <span style={{ color: t.pnl >= 0 ? "#00ff87" : "#ff4757" }}>${t.pnl}</span>
                                        </div>
                                        <div style={{ fontSize: "10px", color: "#888", marginTop: "5px" }}>{t.date} | {t.session} Session</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === "stats" && (
                            <div style={{ textAlign: "center" }}>
                                <div style={{ fontSize: "40px", color: "#ffd700", fontWeight: "bold" }}>{stats.winRate}%</div>
                                <div style={{ fontSize: "10px", color: "#888", letterSpacing: "2px" }}>TOTAL WIN RATE</div>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginTop: "20px" }}>
                                    <div style={{ background: "#0d1117", padding: "15px" }}>
                                        <div style={{ fontSize: "20px" }}>{stats.total}</div>
                                        <div style={{ fontSize: "8px", color: "#555" }}>TRADES</div>
                                    </div>
                                    <div style={{ background: "#0d1117", padding: "15px" }}>
                                        <div style={{ fontSize: "20px", color: "#00ff87" }}>${stats.totalPnl}</div>
                                        <div style={{ fontSize: "8px", color: "#555" }}>TOTAL P&L</div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
